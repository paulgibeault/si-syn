<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        // Apply settings immediately to avoid a flash of unstyled content.
        // Reads font scale from arcade.v1.global.fontScale (the canonical key
        // shared with games via the SDK); falls back to the legacy 'fontScale'
        // key for users who set their preference before the migration.
        (function() {
            let scaleStr = '1';
            const newRaw = localStorage.getItem('arcade.v1.global.fontScale');
            if (newRaw !== null) {
                try {
                    const n = JSON.parse(newRaw);
                    if (typeof n === 'number' && isFinite(n)) scaleStr = String(n);
                } catch (e) {}
            } else {
                scaleStr = localStorage.getItem('fontScale') || '1';
            }
            document.documentElement.style.setProperty('--font-scale', scaleStr);
            document.documentElement.setAttribute('data-theme', 'launcher');
            document.documentElement.classList.add('mode-launcher');
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul's Arcade</title>
    <meta name="description" content="Paul's Arcade — browser games by Paul Gibeault. Pi Game, Silicon Syndicate, HecknSic, Cozy Solitaire. No installs, no signups, plays in your browser.">

    <style>
        /* ========================================
           LAUNCHER PAGE — page-specific styles
           ======================================== */

        /* ---- LAUNCHER HEADER ---- */
        .launcher-header {
            text-align: center;
            padding: 60px 24px 20px;
        }

        .launcher-header__title {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: clamp(2rem, 6vw, 3.5rem);
            letter-spacing: 4px;
            color: var(--snow-white);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .launcher-header__title span {
            color: var(--field-gold);
        }

        /* ---- LAUNCHER GRID ---- */
        #view-launcher {
            padding: 0 40px 80px;
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .launcher-grid {
            display: grid;
            /* rem-based so columns reflow at high font-scale instead of clipping. */
            grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 62.5rem;
            margin: 0 auto;
        }

        .launcher-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        border-color 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            opacity: 0;
            animation: launcher-fade-in 0.6s ease forwards;
        }

        .launcher-btn:hover {
            transform: translateY(-6px);
            border-color: var(--field-gold);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 30px var(--field-gold-dim);
        }

        .launcher-btn__image-wrap {
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16 / 10;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .launcher-btn__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .launcher-btn:hover .launcher-btn__image {
            transform: scale(1.05);
        }

        .launcher-btn__body {
            padding: 14px;
            text-align: center;
            background: rgba(10, 10, 20, 0.4);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .launcher-btn__name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: var(--snow-white);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .launcher-btn__subtitle {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--field-gold);
            letter-spacing: 1px;
        }

        @keyframes launcher-fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .launcher-header { padding: 40px 16px 16px; }
            .launcher-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 16px;
            }
            #view-launcher {
                padding: 0 16px 40px;
            }
            .launcher-btn__name { font-size: 0.95rem; }
            .launcher-btn__subtitle { font-size: 0.6rem; }
        }

        @media (max-width: 480px) {
            .launcher-header { padding: 28px 16px 12px; }
            .launcher-header__title { letter-spacing: 2px; }
            .launcher-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            #view-launcher {
                padding: 0 16px 24px;
            }
            .launcher-btn {
                flex-direction: row;
                align-items: center;
                text-align: left;
            }
            .launcher-btn__image-wrap {
                width: 80px;
                aspect-ratio: 1 / 1;
                border-bottom: none;
                border-right: 1px solid var(--card-border);
            }
            .launcher-btn__body {
                padding: 12px 16px;
                align-items: flex-start;
            }
            .launcher-btn__name { font-size: 1rem; margin-bottom: 2px; }
            .launcher-btn__subtitle { font-size: 0.7rem; }
        }

        /* ---- GAME VIEW (fullscreen iframe overlay) ---- */
        #view-game {
            width: 100%; height: 100vh;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3000; background: #000;
            display: flex; flex-direction: column;
        }
        #view-game.hidden { display: none !important; }
        #iframe-host {
            flex-grow: 1; position: relative; width: 100%; background: #000;
        }
        #iframe-host iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%; border: none; background: #000;
        }
        #iframe-host iframe[hidden] { display: none !important; }
        .game-topbar {
            width: 100%; height: 40px; background: rgba(10, 10, 25, 0.85);
            border-bottom: 1px solid var(--field-gold); display: flex;
            align-items: center; justify-content: space-between; padding: 0 16px;
            box-sizing: border-box; flex-shrink: 0; z-index: 3001;
        }
        .game-topbar__title {
            font-family: var(--font-display); color: var(--field-gold);
            font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8;
            margin: 0; padding: 0;
        }
        .quit-btn {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--field-gold);
            color: var(--snow-white); padding: 4px 10px; border-radius: 4px;
            font-family: var(--font-display); font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
        }
        .quit-btn:hover {
            background: var(--field-gold); color: #000;
        }
        .quit-btn__icon { font-size: 1rem; line-height: 1; margin-top: 1px; }
    </style>
</head>

<script>
    // ==========================================
    // STARFIELD — Dense animated twinkling stars
    // ==========================================
    (function createStarfield() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const container = document.getElementById('starfield');
        const count = 150;

        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            // 15% warm, 10% cool, 75% white
            const r = Math.random();
            if (r > 0.85) star.classList.add('star--warm');
            else if (r > 0.75) star.classList.add('star--cool');

            const size = Math.random() * 2.8 + 0.3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 5 + 2) + 's');
            star.style.setProperty('--max-opacity', (Math.random() * 0.7 + 0.15).toFixed(2));
            star.style.setProperty('--drift-duration', (Math.random() * 30 + 20) + 's');
            star.style.setProperty('--drift-x', (Math.random() * 20 - 10) + 'px');
            star.style.setProperty('--drift-y', (Math.random() * 20 - 10) + 'px');
            star.style.animationDelay = (Math.random() * 6) + 's';
            container.appendChild(star);
        }
    })();

    // ==========================================
    // FONT CONTROL — Adjust root font scale
    // ==========================================
    (function fontControl() {
        const d = document.documentElement;
        const KEY = 'arcade.v1.global.fontScale';
        const LEGACY_KEY = 'fontScale';

        // One-shot migration from legacy key.
        if (localStorage.getItem(KEY) === null) {
            const legacy = localStorage.getItem(LEGACY_KEY);
            if (legacy !== null) {
                const n = parseFloat(legacy);
                if (isFinite(n)) localStorage.setItem(KEY, JSON.stringify(n));
            }
        }
        if (localStorage.getItem(LEGACY_KEY) !== null) {
            localStorage.removeItem(LEGACY_KEY);
        }

        let scale = 1;
        const raw = localStorage.getItem(KEY);
        if (raw !== null) {
            try {
                const n = JSON.parse(raw);
                if (typeof n === 'number' && isFinite(n)) scale = n;
            } catch (e) {}
        }

        const FONT_MIN = 0.5;
        const FONT_MAX = 3.0;
        const FONT_STEP = 0.25;

        function setScale(s) {
            scale = Math.max(FONT_MIN, Math.min(s, FONT_MAX));
            d.style.setProperty('--font-scale', scale);
            localStorage.setItem(KEY, JSON.stringify(scale));
            // Notify mounted game iframes that have subscribed via the SDK.
            if (window.__arcade && window.__arcade.broadcastSettings) {
                window.__arcade.broadcastSettings();
            }
        }

        function bind(decId, incId, resId) {
            const dec = document.getElementById(decId);
            const inc = document.getElementById(incId);
            const res = document.getElementById(resId);
            if (dec) dec.addEventListener('click', () => setScale(scale - FONT_STEP));
            if (inc) inc.addEventListener('click', () => setScale(scale + FONT_STEP));
            if (res) res.addEventListener('click', () => setScale(1));
        }
        bind('menu-font-decrease', 'menu-font-increase', 'menu-font-reset');

        window.__arcade = window.__arcade || {};
        window.__arcade.getFontScale = function () { return scale; };
    })();

    // ==========================================
    // APP MENU — Bottom-right popup menu
    // ==========================================
    (function appMenu() {
        const menu = document.getElementById('launcher-menu');
        const toggle = document.getElementById('launcher-menu-toggle');
        const panel = document.getElementById('launcher-menu-panel');
        if (!menu || !toggle || !panel) return;

        function open() {
            menu.dataset.open = 'true';
            toggle.setAttribute('aria-expanded', 'true');
        }
        function close() {
            delete menu.dataset.open;
            toggle.setAttribute('aria-expanded', 'false');
        }
        function isOpen() { return menu.dataset.open === 'true'; }

        toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            isOpen() ? close() : open();
        });

        document.addEventListener('click', (e) => {
            if (!isOpen()) return;
            if (!menu.contains(e.target)) close();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isOpen()) {
                close();
                toggle.focus();
            }
        });

        // Close after taking an action inside the panel.
        panel.addEventListener('click', (e) => {
            const item = e.target.closest('.launcher-menu__item');
            if (item && !item.disabled) close();
        });

        window.__arcade = window.__arcade || {};
        window.__arcade.launcherMenu = menu;
    })();

    // ==========================================
    // GAME VIEW CONTROLLER — Show/hide fullscreen game iframe
    // ==========================================
    window.__arcade = window.__arcade || {};
    (function gameViewController() {
        const viewLauncher = document.getElementById('view-launcher');
        const viewGame = document.getElementById('view-game');
        const quitGameBtn = document.getElementById('quit-game-btn');

        quitGameBtn.addEventListener('click', () => {
            window.__arcade.hideGameView();
        });

        window.__arcade.viewGame = viewGame;
        window.__arcade.viewLauncher = viewLauncher;
    })();

    // ==========================================
    // PLATFORM CONTROLLER — iframe pool, postMessage protocol, save/load
    // ==========================================
    (function platformController() {
        const KEY_PREFIX = 'arcade.v1.';
        // Anything outside this namespace is rejected on import, so an imported
        // file can never poison non-arcade keys on the origin's localStorage.
        const KEY_RE = /^arcade\.v1\.[a-z0-9_-]+(\.[a-zA-Z0-9_.-]+)+$/;
        const SAVE_FORMAT = 'pauls-arcade-save';
        const SAVE_SCHEMA = 1;
        const MAX_IMPORT_BYTES = 5 * 1024 * 1024;
        const PROBE_KEY = KEY_PREFIX + '_meta.probe';

        const launcherBtns = document.querySelectorAll('.launcher-btn');
        const iframeHost = document.getElementById('iframe-host');
        const topbarTitle = document.getElementById('game-topbar-title');
        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');
        const fileLoad = document.getElementById('file-load');
        const toast = document.getElementById('launcher-toast');
        const viewGame = window.__arcade.viewGame;
        const viewLauncher = window.__arcade.viewLauncher;

        // ---- iframe pool ----
        const pool = new Map(); // gameId -> { iframe, name }
        let activeGameId = null;

        function ensureIframe(gameId, src, name) {
            let entry = pool.get(gameId);
            if (entry) return entry;
            const iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.dataset.gameId = gameId;
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('title', name);
            iframe.hidden = true;
            iframeHost.appendChild(iframe);
            entry = { iframe, name };
            pool.set(gameId, entry);
            return entry;
        }

        function showGame(gameId, src, name) {
            const entry = ensureIframe(gameId, src, name);
            const previousGameId = activeGameId;
            for (const [gid, e] of pool) {
                e.iframe.hidden = (gid !== gameId);
            }
            activeGameId = gameId;
            topbarTitle.textContent = name || "Paul's Arcade";

            document.body.classList.add('app-in-game');
            viewGame.classList.remove('hidden');

            // Lifecycle: suspend prior game (if any) and resume the new one.
            if (previousGameId && previousGameId !== gameId) {
                postToIframe(previousGameId, { type: 'arcade:lifecycle.suspend' });
            }
            postToIframe(gameId, { type: 'arcade:lifecycle.resume' });

            // Defer focus so the iframe receives keyboard input.
            setTimeout(() => { try { entry.iframe.focus(); } catch (e) {} }, 0);
        }

        function hideGameView() {
            viewGame.classList.add('hidden');
            document.body.classList.remove('app-in-game');
            // Iframes stay mounted (hidden) — instant relaunch + state preserved.
            const previousGameId = activeGameId;
            for (const e of pool.values()) e.iframe.hidden = true;
            activeGameId = null;
            if (previousGameId) {
                postToIframe(previousGameId, { type: 'arcade:lifecycle.suspend' });
            }
        }

        window.__arcade.hideGameView = hideGameView;

        launcherBtns.forEach((btn) => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const gameId = btn.dataset.gameId;
                const href = btn.getAttribute('href');
                const name = btn.querySelector('.launcher-btn__name').textContent.trim();
                if (!gameId || !href) return;
                showGame(gameId, href, name);
            });
        });

        // ---- postMessage protocol ----
        function findGameIdForSource(src) {
            for (const [gid, entry] of pool) {
                if (entry.iframe.contentWindow === src) return gid;
            }
            return null;
        }

        function postToIframe(gameId, msg) {
            const entry = pool.get(gameId);
            if (!entry || !entry.iframe.contentWindow) return;
            entry.iframe.contentWindow.postMessage(msg, window.location.origin);
        }

        function broadcast(msg) {
            for (const [gid] of pool) postToIframe(gid, msg);
        }

        // localStorage proxy: hecknsic (and potentially other games) install a
        // postMessage-backed shim that overrides window.localStorage when running
        // in any iframe and blocks module init on a 'dump' reply. Without this
        // handler the game hangs forever after rendering its static HUD.
        // Per-game keys live under arcade.v1.<gameId>.ls.<key> so they ride
        // along with the launcher's save/load bundling and can't collide.
        function lsPrefix(gameId) { return KEY_PREFIX + gameId + '.ls.'; }
        function handleLsProxyRequest(gameId, data, source, origin) {
            const requestId = data.requestId;
            const reply = { type: 'ls-proxy-response', requestId, ok: false };
            try {
                const prefix = lsPrefix(gameId);
                switch (data.op) {
                    case 'dump': {
                        const dump = {};
                        for (let i = 0; i < localStorage.length; i++) {
                            const k = localStorage.key(i);
                            if (k && k.indexOf(prefix) === 0) {
                                dump[k.slice(prefix.length)] = localStorage.getItem(k);
                            }
                        }
                        reply.ok = true;
                        reply.data = dump;
                        break;
                    }
                    case 'setItem':
                        if (typeof data.key === 'string') {
                            localStorage.setItem(prefix + data.key, String(data.value));
                            reply.ok = true;
                        }
                        break;
                    case 'removeItem':
                        if (typeof data.key === 'string') {
                            localStorage.removeItem(prefix + data.key);
                            reply.ok = true;
                        }
                        break;
                    case 'clear': {
                        // Scoped clear — only touches this game's namespace.
                        const toRemove = [];
                        for (let i = 0; i < localStorage.length; i++) {
                            const k = localStorage.key(i);
                            if (k && k.indexOf(prefix) === 0) toRemove.push(k);
                        }
                        for (const k of toRemove) localStorage.removeItem(k);
                        reply.ok = true;
                        break;
                    }
                }
            } catch (err) { /* leave ok:false */ }
            try { source.postMessage(reply, origin); } catch (err) {}
        }

        window.addEventListener('message', (e) => {
            // Source check is the load-bearing guard: only iframes we mounted
            // via ensureIframe can match. Origin may be cross-origin in local
            // dev (parent on localhost, game on github.io) so we don't gate on it.
            const gameId = findGameIdForSource(e.source);
            if (!gameId) return;
            const data = e.data;
            if (!data || typeof data !== 'object') return;
            const t = data.type;
            if (typeof t !== 'string') return;

            if (t === 'ls-proxy-request') {
                handleLsProxyRequest(gameId, data, e.source, e.origin);
                return;
            }

            if (t.indexOf('arcade:') !== 0) return;
            switch (t) {
                case 'arcade:hello':
                    // Announce ourselves. peerStatus is 'idle' — peer transport
                    // is not yet wired; peer.send currently no-ops in the SDK
                    // until status becomes 'connected'. Settings ride along so
                    // the game can apply them before first paint.
                    postToIframe(gameId, {
                        type: 'arcade:welcome',
                        version: 2,
                        peerStatus: 'idle',
                        settings: currentSettings()
                    });
                    // If this game is the active one, also send a resume hint
                    // (the game's SDK may have missed the showGame() resume if
                    // it handshook after the iframe was already visible).
                    if (gameId === activeGameId) {
                        postToIframe(gameId, { type: 'arcade:lifecycle.resume' });
                    }
                    break;
                case 'arcade:peer.send':
                    // No transport yet — drop. Hook here when QRCodeP2P lands.
                    break;
                case 'arcade:ui.toast':
                    // Game asked the launcher to display a toast.
                    if (typeof data.message === 'string' && data.message) {
                        const KIND_OK = { info: 1, success: 1, warning: 1, error: 1 };
                        const kind = KIND_OK[data.kind] ? data.kind : 'info';
                        const dur = (typeof data.duration === 'number' && data.duration > 0)
                            ? data.duration : 2500;
                        showToast(data.message, {
                            error: kind === 'error',
                            duration: dur
                        });
                    }
                    break;
            }
        });

        // Read a JSON-encoded global setting; coerce / default sensibly.
        function readGlobal(key, fallback) {
            try {
                const raw = localStorage.getItem('arcade.v1.global.' + key);
                if (raw === null) return fallback;
                const v = JSON.parse(raw);
                return v === undefined ? fallback : v;
            } catch (e) { return fallback; }
        }
        function defaultTheme() {
            try {
                if (window.matchMedia &&
                    window.matchMedia('(prefers-color-scheme: light)').matches) {
                    return 'light';
                }
            } catch (e) {}
            return 'dark';
        }
        function defaultReducedMotion() {
            try {
                return !!(window.matchMedia &&
                    window.matchMedia('(prefers-reduced-motion: reduce)').matches);
            } catch (e) { return false; }
        }
        function currentSettings() {
            const fs = (window.__arcade && window.__arcade.getFontScale)
                ? window.__arcade.getFontScale() : 1;
            const th = readGlobal('theme', null);
            const rm = readGlobal('reducedMotion', null);
            const av = readGlobal('audioVolume', null);
            const hd = readGlobal('handedness', null);
            return {
                fontScale: fs,
                theme: (th === 'light' || th === 'dark') ? th : defaultTheme(),
                reducedMotion: typeof rm === 'boolean' ? rm : defaultReducedMotion(),
                audioVolume: (typeof av === 'number' && isFinite(av))
                    ? Math.max(0, Math.min(1, av)) : 1,
                handedness: (hd === 'left' || hd === 'right') ? hd : 'right'
            };
        }
        window.__arcade.broadcastSettings = function () {
            broadcast({ type: 'arcade:settings.changed', settings: currentSettings() });
        };

        // ---- toast helper ----
        let toastTimer = null;
        function showToast(msg, opts) {
            opts = opts || {};
            toast.textContent = msg;
            toast.classList.toggle('error', !!opts.error);
            toast.classList.add('visible');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('visible'), opts.duration || 3500);
        }

        // ---- canonical checksum ----
        async function checksumData(data) {
            const keys = Object.keys(data).sort();
            const parts = new Array(keys.length);
            for (let i = 0; i < keys.length; i++) {
                parts[i] = JSON.stringify(keys[i]) + ':' + JSON.stringify(data[keys[i]]);
            }
            const canonical = '{' + parts.join(',') + '}';
            const buf = new TextEncoder().encode(canonical);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            const bytes = new Uint8Array(hash);
            let hex = '';
            for (let i = 0; i < bytes.length; i++) {
                hex += bytes[i].toString(16).padStart(2, '0');
            }
            return 'sha256:' + hex;
        }

        function collectArcadeKeys() {
            const out = {};
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (!k || !KEY_RE.test(k)) continue;
                const v = localStorage.getItem(k);
                if (typeof v === 'string') out[k] = v;
            }
            return out;
        }

        function isoStamp() {
            return new Date().toISOString().replace(/[:.]/g, '-').replace('Z', '');
        }

        function downloadJSON(filename, obj) {
            const json = JSON.stringify(obj, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            try {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                return true;
            } catch (err) {
                // Fallback: open in a new tab so the user can save manually.
                try {
                    const w = window.open();
                    if (w) {
                        w.document.body.style.cssText = 'font-family:monospace;white-space:pre;padding:20px;';
                        w.document.body.textContent = json;
                        return true;
                    }
                } catch (e) {}
                return false;
            }
        }

        async function buildBundle(data) {
            return {
                format: SAVE_FORMAT,
                schemaVersion: SAVE_SCHEMA,
                exportedAt: new Date().toISOString(),
                appVersion: '1.0.0',
                checksum: await checksumData(data),
                data: data
            };
        }

        // ---- save (export) ----
        async function exportSave() {
            const data = collectArcadeKeys();
            const keyCount = Object.keys(data).length;
            if (keyCount === 0) {
                showToast('Nothing to save — no arcade.v1.* keys found.', { error: true });
                return;
            }
            let bundle;
            try {
                bundle = await buildBundle(data);
            } catch (err) {
                showToast('Save failed: could not serialize data.', { error: true });
                return;
            }
            const ok = downloadJSON('pauls-arcade-save-' + isoStamp() + '.json', bundle);
            if (ok) showToast('Saved ' + keyCount + ' keys to your Downloads folder.');
            else showToast('Save failed: browser blocked the download.', { error: true });
        }

        // ---- load (import) ----
        function quotaProbe() {
            try {
                localStorage.setItem(PROBE_KEY, '1');
                localStorage.removeItem(PROBE_KEY);
                return true;
            } catch (e) { return false; }
        }

        function snapshotKeys(keys) {
            const snap = {};
            for (const k of keys) snap[k] = localStorage.getItem(k);
            return snap;
        }

        function restoreSnapshot(snap) {
            for (const k of Object.keys(snap)) {
                const v = snap[k];
                try {
                    if (v === null) localStorage.removeItem(k);
                    else localStorage.setItem(k, v);
                } catch (e) { /* best-effort restore */ }
            }
        }

        function readFileText(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onerror = () => reject(new Error('read failed'));
                r.onabort = () => reject(new Error('read aborted'));
                r.onload = () => resolve(r.result);
                r.readAsText(file);
            });
        }

        async function importSaveFile(file) {
            // Gate 1: size
            if (!file || file.size > MAX_IMPORT_BYTES) {
                showToast('File rejected: size exceeds 5 MB.', { error: true });
                return;
            }
            // Gate 2: read
            let text;
            try { text = await readFileText(file); }
            catch (e) { showToast('Could not read file.', { error: true }); return; }
            // Gate 3: parse
            let parsed;
            try { parsed = JSON.parse(text); }
            catch (e) { showToast('Not valid JSON.', { error: true }); return; }
            // Gate 4: shape
            if (!parsed || typeof parsed !== 'object'
                || parsed.format !== SAVE_FORMAT
                || parsed.schemaVersion !== SAVE_SCHEMA
                || !parsed.data || typeof parsed.data !== 'object'
                || Array.isArray(parsed.data)) {
                showToast('File is not a valid arcade save.', { error: true });
                return;
            }
            // Gate 5: per-key allowlist + value type
            const cleanData = {};
            const droppedKeys = [];
            for (const k of Object.keys(parsed.data)) {
                if (!KEY_RE.test(k) || typeof parsed.data[k] !== 'string') {
                    droppedKeys.push(k);
                    continue;
                }
                cleanData[k] = parsed.data[k];
            }
            const cleanKeys = Object.keys(cleanData);
            if (cleanKeys.length === 0) {
                showToast('Save contained no valid arcade keys.', { error: true });
                return;
            }
            // Gate 6: checksum (over the file's data — we verify what was signed,
            // not what we filtered, to detect tampering with the original file)
            let expected;
            try { expected = await checksumData(parsed.data); }
            catch (e) { showToast('Could not verify checksum.', { error: true }); return; }
            if (typeof parsed.checksum !== 'string' || parsed.checksum !== expected) {
                showToast('Checksum mismatch — file may be corrupt.', { error: true });
                return;
            }
            // Gate 7: confirm with user
            const summary = 'This will replace ' + cleanKeys.length + ' arcade keys.\n'
                + (droppedKeys.length ? droppedKeys.length + ' invalid keys will be ignored.\n' : '')
                + '\nYour current state will be auto-saved to your Downloads folder first.\nContinue?';
            if (!window.confirm(summary)) return;
            // Gate 8: auto-backup current state (if non-empty)
            const currentData = collectArcadeKeys();
            if (Object.keys(currentData).length > 0) {
                try {
                    const backup = await buildBundle(currentData);
                    const ok = downloadJSON('pauls-arcade-autobackup-' + isoStamp() + '.json', backup);
                    if (!ok && !window.confirm('Auto-backup download was blocked. Continue without backup?')) {
                        return;
                    }
                } catch (e) {
                    if (!window.confirm('Auto-backup failed. Continue without backup?')) return;
                }
            }
            // Gate 9: quota probe
            if (!quotaProbe()) {
                showToast('localStorage is full — cannot import.', { error: true });
                return;
            }
            // Gate 10: stage + commit. Snapshot keys we will overwrite.
            const snap = snapshotKeys(cleanKeys);
            try {
                for (const k of cleanKeys) {
                    localStorage.setItem(k, cleanData[k]);
                }
            } catch (err) {
                restoreSnapshot(snap);
                showToast('Write failed mid-import — prior state restored.', { error: true });
                return;
            }
            // Notify mounted iframes; same-origin storage events also fire
            // automatically, so listeners catch the change via either path.
            broadcast({ type: 'arcade:state.replaced' });
            showToast('Imported ' + cleanKeys.length + ' keys successfully.');
        }

        btnSave.addEventListener('click', () => { exportSave(); });
        btnLoad.addEventListener('click', () => { fileLoad.click(); });
        fileLoad.addEventListener('change', () => {
            const f = fileLoad.files && fileLoad.files[0];
            // Reset so picking the same file twice still fires 'change'.
            fileLoad.value = '';
            if (f) importSaveFile(f);
        });
    })();

    // ==========================================
    // PWA INSTALL — Service worker & install flow
    // ==========================================
    (function pwaInstall() {
        if ('serviceWorker' in navigator) {
            /* SW disabled in ago */ false && navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
        }

        const installBtn = document.getElementById('install-btn');
        const installSection = document.getElementById('menu-install-section');
        let deferredPrompt;

        function showInstallUI() {
            if (installSection) installSection.removeAttribute('hidden');
        }

        function hideInstallUI() {
            if (installSection) installSection.setAttribute('hidden', '');
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallUI();
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                hideInstallUI();
                if (outcome === 'accepted') console.log('PWA installed');
            });
        }

        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            hideInstallUI();
        });
    })();
</script>

</body>
</html>
