<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#39bae6"/>
      <stop offset="100%" stop-color="#2a8ab8"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Periodic table tile -->
  <rect x="56" y="36" width="400" height="440" rx="16" fill="#0d1520" stroke="#39bae6" stroke-width="3" opacity="0.9"/>
  <rect x="56" y="36" width="400" height="440" rx="16" fill="none" stroke="#39bae6" stroke-width="1" opacity="0.15"/>

  <!-- Atomic number -->
  <text x="96" y="100" font-family="'Courier New', monospace" font-size="36" fill="#6c7a8a">14</text>

  <!-- Element symbol: Si -->
  <text x="256" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="200" font-weight="bold" fill="url(#glow)" filter="url(#neon)">Si</text>

  <!-- SYN underneath -->
  <text x="256" y="380" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="#7fd962" letter-spacing="12" filter="url(#neon)">SYN</text>

  <!-- Atomic mass at bottom -->
  <text x="256" y="452" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" fill="#3a4a5a">28.085</text>
</svg>
