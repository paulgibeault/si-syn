<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Silicon Syndicate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e14;
      --panel: #131820;
      --border: #1e2a3a;
      --text: #c5cdd8;
      --dim: #5c6773;
      --accent: #39bae6;
      --green: #7fd962;
      --red: #f07178;
      --yellow: #e6b450;
      --font: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #level-select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 13px;
      border-radius: 3px;
    }

    /* --- Main area --- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Level info bar --- */
    #level-info {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    #level-info .name {
      color: var(--yellow);
      font-weight: bold;
      margin-bottom: 2px;
    }
    #level-info .desc {
      color: var(--dim);
      font-size: 12px;
    }

    /* --- Editor section --- */
    #editor-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 8px 12px;
    }
    #editor-section label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #code-editor {
      flex: 1;
      background: var(--bg);
      color: var(--green);
      border: 1px solid var(--border);
      padding: 8px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      border-radius: 3px;
      min-height: 80px;
    }
    #code-editor:focus {
      outline: none;
      border-color: var(--accent);
    }
    #hint {
      font-size: 11px;
      color: var(--dim);
      margin-top: 4px;
      font-style: italic;
    }

    /* --- Controls --- */
    #controls {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
      align-items: center;
    }
    #controls button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      font-family: var(--font);
      font-size: 13px;
      border-radius: 3px;
      cursor: pointer;
      min-width: 60px;
    }
    #controls button:active {
      background: var(--border);
    }
    #btn-run { border-color: var(--green); color: var(--green); }
    #btn-stop { border-color: var(--red); color: var(--red); }
    #cycle-display {
      margin-left: auto;
      color: var(--dim);
      font-size: 12px;
    }

    /* --- Waveform / Oscilloscope --- */
    #waveform-section {
      flex-shrink: 0;
      padding: 8px 12px;
      overflow-x: auto;
    }
    #waveform-section label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 4px;
    }
    #waveform {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 80px;
    }
    .wave-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 24px;
    }
    .wave-bar {
      width: 20px;
      border-radius: 2px 2px 0 0;
      position: relative;
    }
    .wave-bar.pass { background: var(--green); }
    .wave-bar.fail { background: var(--red); }
    .wave-bar.expected {
      background: none;
      border: 1px dashed var(--dim);
      border-bottom: none;
      opacity: 0.6;
    }
    .wave-label {
      font-size: 9px;
      color: var(--dim);
      margin-top: 2px;
    }

    /* --- Result banner --- */
    #result-banner {
      text-align: center;
      padding: 8px;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
      display: none;
    }
    #result-banner.pass {
      display: block;
      background: #1a3320;
      color: var(--green);
      border-top: 2px solid var(--green);
    }
    #result-banner.fail {
      display: block;
      background: #331a1a;
      color: var(--red);
      border-top: 2px solid var(--red);
    }

    /* --- Instruction drawer (mobile-friendly) --- */
    #instr-drawer {
      display: flex;
      gap: 4px;
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .instr-btn {
      background: var(--bg);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .instr-btn:active {
      background: var(--border);
    }

    /* --- Landscape tweaks --- */
    @media (min-width: 700px) {
      main {
        flex-direction: row;
      }
      #editor-section {
        flex: 1;
        border-right: 1px solid var(--border);
      }
      #right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      #controls {
        border-top: none;
      }
    }

    @media (max-width: 699px) {
      #right-panel {
        display: flex;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Silicon Syndicate</h1>
    <select id="level-select"></select>
  </header>

  <div id="level-info">
    <div class="name" id="level-name"></div>
    <div class="desc" id="level-desc"></div>
  </div>

  <main>
    <div id="editor-section">
      <label>MCU Code</label>
      <textarea id="code-editor" spellcheck="false" autocapitalize="none" autocomplete="off"></textarea>
      <div id="hint"></div>
    </div>

    <div id="right-panel">
      <div id="controls">
        <button id="btn-run">Run</button>
        <button id="btn-step">Step</button>
        <button id="btn-reset">Reset</button>
        <span id="cycle-display">Cycle: 0</span>
      </div>

      <div id="waveform-section">
        <label>Output Waveform</label>
        <div id="waveform"></div>
      </div>

      <div id="result-banner"></div>
    </div>
  </main>

  <div id="instr-drawer">
    <button class="instr-btn" data-instr="mov ">mov</button>
    <button class="instr-btn" data-instr="add ">add</button>
    <button class="instr-btn" data-instr="sub ">sub</button>
    <button class="instr-btn" data-instr="mul ">mul</button>
    <button class="instr-btn" data-instr="teq ">teq</button>
    <button class="instr-btn" data-instr="tgt ">tgt</button>
    <button class="instr-btn" data-instr="slp ">slp</button>
    <button class="instr-btn" data-instr="jmp ">jmp</button>
    <button class="instr-btn" data-instr="djt ">djt</button>
    <button class="instr-btn" data-instr="djf ">djf</button>
    <button class="instr-btn" data-instr="acc">acc</button>
    <button class="instr-btn" data-instr="dat">dat</button>
    <button class="instr-btn" data-instr="p0">p0</button>
    <button class="instr-btn" data-instr="p1">p1</button>
    <button class="instr-btn" data-instr=":\n">:</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
